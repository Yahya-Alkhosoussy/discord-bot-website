<!-- Base.html -->
<!DOCTYPE html>
<html>
    <head>
        <title>{% block title %}SpiderByte{% endblock %}</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css')}}">
    </head>
    <body>
        
        <header class="set-header"> 
            <div class="header-left">
                {% block header_left %}
                    Logged in as {{ session.user.username }}
                    {% if session.user.avatar %}
                        <img src="https://cdn.discordapp.com/avatars/{{ session.user.id }}/{{ session.user.avatar }}.png?size=24"
                            alt="{{ user.username }}'s avatar"
                            class="avatar">
                    {% else %}
                        <div class="avatar-fallback">{{ session.user.username[0] }}</div>
                    {% endif %}
                {% endblock %}
            </div>
            <div class="header-right">
                {% block header_right %}
                    <a href="{{ url_for('discord_dashboard') }}" class="back-button">All Servers</a>
                {% endblock %}
            </div>
        </header>
        
        {% block content %}{% endblock %}
        {% block scripts %}
        <script>
            document.querySelectorAll('.toggle-active').forEach(checkbox => {
                checkbox.addEventListener('change', async function() {
                    const commandId = this.dataset.commandId;
                    const response = await fetch(`/twitch/dashboard/toggle-command/${commandId}`, {
                        method: "POST",
                        headers: {'Content-Type': 'application/json'},
                    });

                    if (!response.ok) {
                        // revert change if request failed
                        this.checked = !this.checked;
                        console.error('Failed to toggle command', commandId);
                    }
                });
            });

            document.querySelectorAll('.delete-command').forEach(button => {
                button.addEventListener('click', async function () {
                    const commandName = this.dataset.commandName;
                    if (!confirm(`Delete the ${commandName} command?`)) return;
                    const commandId = this.dataset.commandId;
                    const response = await fetch(`/twitch/dashboard/delete-command/${commandId}`, {
                        method: "POST",
                        headers: {'Content-Type': 'application/json'},
                    });

                    if (!response.ok) {
                        console.error('Failed to delete command');
                        return;
                    }

                    // Remove the row from the table without reloading the page
                    this.closest('tr').remove();
                });
            });
        </script>
        {% endblock %}
    </body>
</html>
